[pytest]
# Pytest configuration for AI Coding Agent test suite

# Minimum version
minversion = 7.0

# Add options
addopts =
    -v
    --strict-markers
    --tb=short

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit test for a single module
    integration: Integration test for multiple modules
    system: System/E2E test for full workflows
    critical: Critical test that must pass
    slow: Slow test (>5 seconds)
    requires_api: Test requires external API calls
    requires_filesystem: Test requires filesystem access

# Async support
asyncio_mode = auto
